name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ─────────────────────────────────────────
    # 1. سحب الكود
    # ─────────────────────────────────────────
    - name: Checkout Code
      uses: actions/checkout@v4

    # ─────────────────────────────────────────
    # 2. JDK 17
    # ─────────────────────────────────────────
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # لا تستخدم cache هنا — هنعمل cache يدوي أشمل في الخطوات الجاية

    # ─────────────────────────────────────────
    # 3. Cache الـ Gradle (dependencies + build cache)
    #    أهم خطوة لتسريع الـ build
    # ─────────────────────────────────────────
    - name: Cache Gradle Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.gradle/notifications
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    # ─────────────────────────────────────────
    # 4. Cache الـ Android SDK Build Tools
    # ─────────────────────────────────────────
    - name: Cache Android SDK
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.ANDROID_HOME }}/build-tools
          ${{ env.ANDROID_HOME }}/platforms
          ${{ env.ANDROID_HOME }}/platform-tools
        key: android-sdk-${{ runner.os }}-${{ hashFiles('**/build.gradle*') }}
        restore-keys: |
          android-sdk-${{ runner.os }}-

    # ─────────────────────────────────────────
    # 5. Cache خاص بـ Chaquopy (Python + pip packages)
    #    بدونه بيحمل yt-dlp من الأول كل مرة (دقايق!)
    # ─────────────────────────────────────────
    - name: Cache Chaquopy Python & Packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches/chaquopy
          app/.chaquopy
        key: chaquopy-${{ runner.os }}-${{ hashFiles('**/build.gradle*', '**/build.gradle.kts') }}
        restore-keys: |
          chaquopy-${{ runner.os }}-

    # ─────────────────────────────────────────
    # 6. صلاحيات gradlew
    #    (لا تولد wrapper جديد — استخدم اللي في الـ repo)
    # ─────────────────────────────────────────
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # ─────────────────────────────────────────
    # 7. بناء الـ APK
    # ─────────────────────────────────────────
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --no-daemon
      env:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dorg.gradle.daemon=false"

    # ─────────────────────────────────────────
    # 8. عرض حجم الـ APK في الـ log
    # ─────────────────────────────────────────
    - name: Show APK Size
      run: |
        APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
        if [ -f "$APK_PATH" ]; then
          SIZE=$(du -sh "$APK_PATH" | cut -f1)
          echo "✅ APK built successfully — Size: $SIZE"
        else
          echo "❌ APK not found!"
          exit 1
        fi

    # ─────────────────────────────────────────
    # 9. رفع الـ APK كـ Artifact
    # ─────────────────────────────────────────
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-${{ github.run_number }}
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7   # احتفظ بالـ APK 7 أيام بس (توفير مساحة)

    # ─────────────────────────────────────────
    # 10. إشعار بالنتيجة في حالة الفشل
    # ─────────────────────────────────────────
    - name: Upload Build Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ github.run_number }}
        path: |
          app/build/reports/
          ~/.gradle/daemon/*/daemon-*.log
        retention-days: 3
