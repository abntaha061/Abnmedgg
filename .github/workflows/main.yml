name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ─────────────────────────────────────────
    # 1. سحب الكود
    # ─────────────────────────────────────────
    - name: Checkout Code
      uses: actions/checkout@v4

    # ─────────────────────────────────────────
    # 2. JDK 17
    # ─────────────────────────────────────────
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # ─────────────────────────────────────────
    # 3. Cache الـ Gradle
    # ─────────────────────────────────────────
    - name: Cache Gradle Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.gradle/notifications
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    # ─────────────────────────────────────────
    # 4. Cache الـ Android SDK
    # ─────────────────────────────────────────
    - name: Cache Android SDK
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.ANDROID_HOME }}/build-tools
          ${{ env.ANDROID_HOME }}/platforms
          ${{ env.ANDROID_HOME }}/platform-tools
        key: android-sdk-${{ runner.os }}-${{ hashFiles('**/build.gradle*') }}
        restore-keys: |
          android-sdk-${{ runner.os }}-

    # ─────────────────────────────────────────
    # 5. Cache Chaquopy
    # ─────────────────────────────────────────
    - name: Cache Chaquopy Python & Packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches/chaquopy
          app/.chaquopy
        key: chaquopy-${{ runner.os }}-${{ hashFiles('**/build.gradle*', '**/build.gradle.kts') }}
        restore-keys: |
          chaquopy-${{ runner.os }}-

    # ─────────────────────────────────────────
    # 6. توليد Gradle Wrapper
    #    AGP 9.1.1 يحتاج Gradle 9.3.1 كحد أدنى
    # ─────────────────────────────────────────
    - name: Setup Gradle Wrapper
      run: gradle wrapper --gradle-version 9.3.1 --distribution-type bin

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # ─────────────────────────────────────────
    # 7. توليد debug.keystore
    #    المشروع بيستخدم signingConfig مخصص اسمه debugConfig
    #    بيدور على debug.keystore في root المشروع
    # ─────────────────────────────────────────
    - name: Generate Debug Keystore
      run: |
        keytool -genkey -v \
          -keystore debug.keystore \
          -storepass android \
          -alias androiddebugkey \
          -keypass android \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=Android Debug,O=Android,C=US"

    # ─────────────────────────────────────────
    # 8. بناء الـ APK
    #    --no-configuration-cache لتجنب مشاكل AGP 9.x
    #    -Xmx4g مطابق لـ gradle.properties
    # ─────────────────────────────────────────
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --no-daemon --no-configuration-cache
      env:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8"

    # ─────────────────────────────────────────
    # 9. التحقق من الـ APK
    # ─────────────────────────────────────────
    - name: Show APK Size
      run: |
        APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
        if [ -f "$APK_PATH" ]; then
          SIZE=$(du -sh "$APK_PATH" | cut -f1)
          echo "✅ APK built successfully — Size: $SIZE"
        else
          echo "❌ APK not found!"
          exit 1
        fi

    # ─────────────────────────────────────────
    # 10. رفع الـ APK
    # ─────────────────────────────────────────
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-${{ github.run_number }}
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    # ─────────────────────────────────────────
    # 11. رفع الـ Logs عند الفشل
    # ─────────────────────────────────────────
    - name: Upload Build Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ github.run_number }}
        path: |
          app/build/reports/
          ~/.gradle/daemon/*/daemon-*.log
        retention-days: 3
